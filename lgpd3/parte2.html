<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="qual-a-finalidade-da-lgpd-1">Qual a finalidade da LGPD?</h1>
<ul>
<li>
<h3 id="disciplinar-o-tratamento-de-dados-pessoais-inclusive-em-meios-digitais-realizado-por-pessoas-naturais-ou-jur%C3%ADdicas-de-direito-p%C3%BAblico-ou-privado-com-o-objetivo-de-proteger-os-direitos-fundamentais-de-liberdade-privacidade-e-livre-desenvolvimento-da-personalidade-da-pessoa-natural">Disciplinar o tratamento de dados pessoais, inclusive em <code>meios digitais</code>, realizado por pessoas <code>naturais</code> ou <code>jurídicas</code>, de direito <code>público</code> ou <code>privado</code>, com o objetivo de proteger os direitos fundamentais de <code>liberdade</code>, <code>privacidade</code> e livre desenvolvimento da <code>personalidade</code> da pessoa natural.</h3>
<blockquote>
<p>Art. 1º da Lei nº 13.709/2018.</p>
</blockquote>
</li>
</ul>
<footer>Realização da TrustDPO - 2026</footer>
</section>

 à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--class:white-slide;--theme:church;--lang:pt;--marpit-advanced-background-split:30%;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">

</li>

<li>o livre desenvolvimento da <br /> <strong>personalidade</strong> da pessoa natural.</li>

</div></div>

<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="em-termos-pr%C3%A1ticos">Em termos práticos</h1>
<div class="multicolumn"><div>
<ul>
<li>
<h3 id="pela-primeira-vez-a-titularidade-dos-dados-pessoais-%C3%A9-reconhecida-legalmente">Pela primeira vez a <strong>titularidade</strong> dos dados pessoais é reconhecida <strong>legalmente</strong>;</h3>
</li>
<li>
<h3 id="um-conjunto-de-conceitos-sobre-o-tema-%C3%A9-definido">Um conjunto de <strong>conceitos</strong> sobre o tema, é definido.</h3>

<ul>
<li>
<h3 id="a-lgpd-n%C3%A3o-pro%C3%ADbe-o-uso-de-dados-pessoais">A LGPD <strong>não proíbe</strong> o uso de dados pessoais.</h3>

<h3 id="a-lgpd-busca-assegurar-que-o-tratamento-dos-dados-pessoais-ocorra-de-forma-adequada-e-condizente-com-a-dignidade-humana">A <strong>LGPD</strong> busca assegurar que o <strong>tratamento</strong> dos dados pessoais ocorra de forma adequada e condizente com a dignidade humana.</h3>

<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>

<p>A LGPD estabelece <strong>regras claras</strong> para que o uso dos dados pessoais ocorra com <strong>finalidade legítima</strong>, <strong>respeito aos direitos</strong> do titular, <strong>segurança</strong> da informação e <strong>prestação de contas</strong>.</p>

</section>

<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="o-esp%C3%ADrito-da-lei">O Espírito da Lei</h1>
<p><small>A lógica da LGPD não é perguntar:</small></p>
<p><strong>&quot;Posso divulgar este dado?&quot;</strong>
<br /><br />
<small>Mas sim, perguntar:</small></p>
<p><strong>&quot;Preciso divulgar este dado para atingir uma finalidade legítima e consigo justificar essa decisão?&quot;</strong></p>
<footer>Realização da TrustDPO - 2026</footer>
</section>

<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>

<h2 id="o-que-%C3%A9-preciso-garantir-para-que-o-tratamento-seja-l%C3%ADcito">O que é preciso garantir para que o tratamento seja lícito?</h2>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="9" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="requisitos-para-o-tratamento">Requisitos para o Tratamento</h1>
<h3 id="a-lgpd-n%C3%A3o-impede-o-uso-leg%C3%ADtimo-de-dados-pessoais-br-a-lei-exige-que-o-tratamento-apresente-as-seguintes-propriedades-sup-art-6%C2%BA-sup-br">A LGPD <strong>não</strong> impede o <strong>uso legítimo</strong> de dados pessoais. <br /> A lei exige que o <strong>tratamento</strong> apresente as seguintes propriedades: <sup> (Art. 6º) </sup> <br /></h3>
<div class="multicolumn vcenter" ><div>
<ul>
<li>Tenha finalidade <br /> legítima;</li>
<li>Seja adequado;</li>
<li>Seja necessário;</li>
<li>Permita livre acesso;</li>
<li>Garanta a qualidade <br /> dos dados;</li>
</ul>
</div><div>
<ul>
<li>Garanta transparecia <br /> aos titulares;</li>
<li>Garanta a segurança;</li>
<li>Previna danos;</li>
<li>Não discrimine;</li>
<li>Seja responsabilizável;</li>
</ul>
</div><div>
<p><img src="./img/f049.png" alt="" style="filter:saturate(1.5);" /></p>
</div></div>

<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="1-dado-pessoal"><strong>1.</strong> Dado Pessoal</h1>
<div class="multicolumn "><div>
</div><div>
<h2 id="conceito">Conceito:</h2>
<ul>
<li>Dado pessoal é toda informação relacionada a <strong>pessoa natural</strong> <strong>identificada</strong> ou <strong>identificável</strong>. <p> <sup> (Art. 5º, I) </sup></li>
</ul>
</div><div>
<h2 id="ideia-central">Ideia central:</h2>
<ul>
<li>Sempre que uma informação permitir identificar uma pessoa, <strong>direta</strong> ou <strong>indiretamente</strong>, haverá dado pessoal.</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="11" style="" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="12" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="exemplos-de-dados-pessoais">Exemplos de Dados Pessoais</h1>
<h2 id="s%C3%A3o-exemplos-de-dados-pessoais">São exemplos de dados pessoais:</h2>

<li>RG;</li>
<li>endereço;</li>
<li>telefone;</li>
<li>e-mail;</li>
<li>matrícula funcional;</li>
</ul>
<p> </p>
<ul>
<li>imagem;</li>
<li>assinatura;</li>
<li>localização;</li>
<li>dados bancários;</li>
<li>número de prontuário;</li>
<li>número de processo.</li>
</ul>
<p><img src="./img/f006.png" alt="" style="height:350px;filter:brightness(1.1) saturate(1.2);" /></p>
</div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="13" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;--marpit-advanced-background-split:50%;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;./img/f060.png&quot;);background-size:auto 450px;filter:saturate(1.6);"></figure></div></section></foreignObject><foreignObject width="50%" height="720"><section id="18" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="13" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;--marpit-advanced-background-split:50%;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="2-pessoa-identificada"><strong>2.</strong> Pessoa Identificada</h1>
<p>Pessoa identificada é aquela que pode ser reconhecida diretamente a partir da informação disponível.</p>
<h2 id="exemplo">Exemplo</h2>
<ul>
<li>“João da Silva dos Anzóis&quot;,</li>
<li>CPF nº XXX.XXX.XXX-XX.</li>
</ul>
<p>Nesse caso, há identificação direta do titular.</p>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="13" style="" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-class="white-slide" data-theme="church" data-lang="pt" lang="pt" class="white-slide" data-marpit-pagination="14" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--class:white-slide;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="aten%C3%A7%C3%A3o-%C3%A0-identifica%C3%A7%C3%A3o-indireta">Atenção à Identificação Indireta</h1>
<div class="multicolumn" valign="center"><div>
<p><img src="./img/f049.png" alt="" style="width:350px;filter:saturate(1.5);" /></p>
</div><div>
</div><div>
<ul>
<li>
<h3 id="nem-sempre-o-dado-pessoal-aparece-de-forma-evidente">Nem sempre o dado pessoal aparece de forma evidente.</h3>
</li>
<li>
<h3 id="um-dado-aparentemente-gen%C3%A9rico-pode-tornar-se-pessoal-quando-combinado-com-outros-registros-brsub-ex-placa-de-autom%C3%B3vel-e-o-banco-de-dados-do-detransub">Um dado aparentemente genérico pode tornar-se pessoal quando combinado com outros registros. <br /><sub> <strong>Ex.:</strong> Placa de automóvel e o banco de dados do DETRAN.</sub></h3>
</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="15" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="3-pessoa-identific%C3%A1vel"><strong>3.</strong> Pessoa Identificável</h1>
<div class="multicolumn"><div>
<ul>
<li>Pessoa identificável é aquela que pode ser reconhecida indiretamente pela combinação de dados.</li>
</ul>
<h2 id="exemplo-1">Exemplo:</h2>
</div><div>
<p> </p>
</div><div>
<ul>
<li>A combinação desses elementos pode permitir a identificação de uma pessoa específica.</li>
</ul>
</div></div>
<div class="multicolumn"><div >
<ol>
<li>matrícula;</li>
<li>cargo;</li>
<li>setor;</li>
<li>idade;</li>
</ol>
</div><div>
<ol start="5">
<li>município;</li>
<li>horário de trabalho;</li>
<li>localização de GPS;</li>
<li>condição física.</li>
</ol>
</div><div align=center>
<p><img src="./img/f075.png" alt="" style="height:350px;" /></p>
</div></div>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="16" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="pessoa-identific%C3%A1vel">Pessoa Identificável</h1>
<div class="multicolumn"><div>
<p><img src="./img/f075b.png" alt="" style="height:400px;" /></p>
</div><div>
<h2 id="exemplo-2">Exemplo:</h2>
<ul>
<li>“Única servidora gestante do setor”;</li>
<li>“Paciente internado no leito X”;</li>
<li>“Aluno com deficiência da turma Y”;</li>
<li>“Fiscal do contrato nº 10/2024”;</li>
<li>&quot;Prefeita da cidade XYZ&quot;;</li>
<li>&quot;O careca da sala&quot;;</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="17" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="4-dado-pessoal-sens%C3%ADvel"><strong>4.</strong> Dado Pessoal Sensível</h1>
<h2 id="conceito-1"><strong>Conceito</strong></h2>
<h3 id="dado-pessoal-sens%C3%ADvel-%C3%A9-dado-com-maior-potencial-de-discrimina%C3%A7%C3%A3o-ou-dano-como-sa%C3%BAde-biometria-religi%C3%A3o-opini%C3%A3o-pol%C3%ADtica-origem-racial-ou-%C3%A9tnica-sup-art-5%C2%BA-ii-sup">Dado pessoal sensível é dado com maior potencial de discriminação ou dano, como saúde, biometria, religião, opinião política, origem racial ou étnica. <sup> (Art. 5º, II) </sup></h3>
<h4 id="s%C3%A3o-dados-pessoais-sens%C3%ADveis">São dados pessoais sensíveis:</h4>
<div class="multicolumn" valign="center"><div>
<ol>
<li>origem racial ou étnica;</li>
<li>convicção religiosa;</li>
<li>opinião política;</li>
<li>filiação sindical;</li>
</ol>
</div><div>
<ol start="5">
<li>dado referente à saúde;</li>
<li>dado referente à vida sexual;</li>
<li>dado genético;</li>
<li>dado biométrico vinculado à pessoa natural.</li>
</ol>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="18" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="dado-pessoal-sens%C3%ADvel">Dado Pessoal Sensível</h1>
<p>São dados que potencialmente podem causar constrangimento, discriminação, segregação ao titular e, por isso, exigem maior cautela.</p>
<h4 id="podem-gerar">Podem gerar:</h4>
<div class="multicolumn" valign="center"><div>
<ul>
<li>discriminação;</li>
<li>exposição indevida;</li>
<li>constrangimento;</li>
</ul>
</div><div>
<ul>
<li>dano moral;</li>
<li>tratamento desigual;</li>
<li>violação de direitos fundamentais.</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="19" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="5-dado-anonimizado"><strong>5.</strong> Dado Anonimizado</h1>
<div class="multicolumn vcenter"><div>
<p><img src="./img/f085b.png" alt="" style="width:300px;filter:saturate(2);" /></p>
</div><div>
<h2 id="conceito-2"><strong>Conceito:</strong></h2>
<ul>
<li>Dado anonimizado é aquele relativo a titular que não possa ser identificado, considerando a utilização de <strong>meios técnicos razoáveis</strong> e disponíveis na ocasião do tratamento. <sup> (Art. 5º, III) </sup></li>
</ul>
</div><div>
<h2 id="ideia-central-1"><strong>Ideia central:</strong></h2>
<ul>
<li>O titular não deve ser identificado de forma <br /> direta ou indireta e de forma definitiva.Se houver possibilidade de <strong>reverter</strong> o processo, teremos uma <strong>pseudo anonimização</strong>.</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="20" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="exemplo-de-anonimiza%C3%A7%C3%A3o">Exemplo de Anonimização</h1>
<div class="multicolumn"><div>
<h2 id="dado-pessoal"><strong>Dado pessoal:</strong></h2>
<p><box> “Maria, 45 anos, servidora do setor X, diagnosticada com determinada doença.” </box></p>
</div><div>
</div><div>
<h2 id="dado-anonimizado"><strong>Dado anonimizado:</strong></h2>
<p><box> “12% dos servidores avaliados apresentaram determinada condição de saúde.” </box></p>
<ul>
<li>Neste segundo caso, a informação é estatística e não identifica a pessoa.</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="21" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="6-pseudonimiza%C3%A7%C3%A3o"><strong>6.</strong> Pseudonimização</h1>
<p>A pseudonimização é o <strong>tratamento</strong> por meio do qual um dado perde a possibilidade de <strong>associação</strong>, <strong>direta</strong> ou <strong>indireta</strong>, a um indivíduo, senão pelo uso de <strong>informação adicional</strong> mantida separadamente pelo controlador em ambiente <strong>controlado</strong> e <strong>seguro</strong>. <sup> (Art. 13, § 4º) </sup></p>
<div class="multicolumn" valign="center"><div>
<p><img src="./img/f038b.png" alt="" style="width:300px;" /></p>
</div><div>
<ul>
<li>A pseudonimização reduz a identificação direta, mas não elimina totalmente a possibilidade de reidentificação.</li>
</ul>
<h2 id="exemplo-3">Exemplo:</h2>
<ul>
<li>
<p>Substituir nomes por códigos, mantendo uma tabela separada de correspondência.</p>
</li>
<li>
<p>A pseudonimização é medida útil de segurança, mas não equivale necessariamente à anonimização.</p>
</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="22" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="8-titular-propriet%C3%A1rio"><strong>8.</strong> Titular (proprietário)</h1>
<h2 id="conceito-3"><strong>Conceito:</strong></h2>
<ul>
<li>Titular é a pessoa natural a quem se referem os dados pessoais objeto de tratamento. Somente pessoas naturais são titulares de dados pessoais para fins da LGPD. <sup> (Art. 5º, V) </sup></li>
</ul>
<h4 id="exemplos-de-titulares"><strong>Exemplos de titulares:</strong></h4>
<div class="multicolumn" valign="center"><div>
<ul>
<li>cidadão;</li>
<li>magistrado;</li>
<li>servidor;</li>
<li>aluno;</li>
</ul>
</div><div>
<ul>
<li>estagiário;</li>
<li>fornecedor pessoa física;</li>
<li>representante legal;</li>
<li>visitante;</li>
</ul>
</div><div>
<p><img src="./img/f001.png" alt="" style="width:200px;filter:saturate(1.5);" /></p>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="23" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="9-controlador"><strong>9.</strong> Controlador</h1>
<div class="multicolumn" valign="center"><div>
<p><img src="./img/f076.png" alt="" style="height:350px;" /></p>
</div><div>
<h2 id="conceito-4"><strong>Conceito:</strong></h2>
<ul>
<li>Pessoa <strong>natural</strong> ou <strong>jurídica</strong>, de direito público ou privado, a quem competem as <strong>decisões</strong> referentes ao tratamento de dados pessoais. É quem define finalidades, meios essenciais e hipóteses de tratamento. <sup> (Art. 5º, VI) </sup></li>
</ul>
<h2 id="em-termos-pr%C3%A1ticos-2"><strong>Em termos práticos:</strong></h2>
<ul>
<li>É quem decide por que, como e para qual finalidade os dados serão tratados.</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="24" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="o-que-o-controlador-decide">O que o Controlador decide?</h1>
<h2 id="o-controlador-normalmente-define">O controlador normalmente define:</h2>
<div class="multicolumn" valign="center"><div>
<p><img src="./img/f076.png" alt="" style="height:350px;" /></p>
</div><div>
<ul>
<li>finalidade do tratamento;</li>
<li>dados necessários;</li>
<li>base legal;</li>
<li>prazo de retenção;</li>
</ul>
</div><div>
<ul>
<li>compartilhamentos;</li>
<li>medidas de segurança;</li>
<li>responsáveis internos;</li>
<li>execução de ROPA e do RIPD.</li>
</ul>
</div></div>
<ul>
<li>No caso de <strong>Ananindeua</strong>, o controlador é a <strong>Prefeitura Municipal</strong></li>
</ul>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="25" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="10-operador"><strong>10.</strong> Operador</h1>
<div class="multicolumn vcenter"><div>
<p><img src="./img/f040.png" alt="" style="filter:saturate(2);" /></p>
</div><div>
&nbsp;
</div><div>
<h2 id="conceito-5"><strong>Conceito:</strong></h2>
<p>Operador é a pessoa natural ou jurídica que <strong>realiza o tratamento</strong> de dados pessoais em nome do controlador. <sup> (Art. 5º, VII) </sup></p>
</div><div>
<h2 id="em-termos-pr%C3%A1ticos-3"><strong>Em termos práticos:</strong></h2>
<p>O operador <strong>executa</strong> o trata- mento conforme as instruções do controlador. Sua responsabilidade está associada à forma comorealiza o tratamento.</p>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="26" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;--marpit-advanced-background-split:33%;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;./img/f082.png&quot;);background-size:auto 450px;filter:saturate(2);"></figure></div></section></foreignObject><foreignObject width="67%" height="720"><section id="31" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="26" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;--marpit-advanced-background-split:33%;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="11-encarregado-dpo"><strong>11.</strong> Encarregado (DPO)</h1>

<h2 id="conceito-6"><strong>Conceito:</strong></h2>
<p>Encarregado é a pessoa indicada pelo controlador e pelo operador para atuar como canal de comunicação entre: <sup> (Art. 5º, VIII; Art. 41) </sup></p>
<ul>
<li>controlador;</li>
<li>titulares dos dados;</li>
<li>Autoridade Nacional de Proteção de Dados.</li>
</ul>

</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="30" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="16-relat%C3%B3rio-de-impacto-%C3%A0-prote%C3%A7%C3%A3o-de-dados-ripd"><strong>16.</strong> Relatório de Impacto à Proteção de Dados <strong>(RIPD)</strong></h1>
<div class="multicolumn" valign="center"><div>
<p><img src="./img/f020.png" alt="" style="width:500px;filter:saturate(2);" /></p>
</div><div>
<h2 id="conceito-8"><strong>Conceito:</strong></h2>
<p>O Relatório de Impacto à Proteção de Dados Pessoais (<strong>RIPD</strong>), é documento do <strong>controlador</strong> que descreve processos de tratamento que podem gerar <strong>riscos</strong> às <strong>liberdades civis</strong> e aos <strong>direitos fundamentais</strong>. <sup> (Art. 5º, XVII) </sup></p>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="31" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="conte%C3%BAdo-b%C3%A1sico-do-ripd">Conteúdo Básico do <strong>RIPD</strong></h1>
<h3 id="o-ripd-deve-conter-sup-art-38-par%C3%A1grafo-%C3%BAnico-sup"><strong>O RIPD deve conter:</strong> <sup> (Art. 38, parágrafo único) </sup></h3>
<div class="multicolumn" valign="center"><div>
<ul>
<li>descrição do tratamento;</li>
<li>finalidade;</li>
<li>categorias de dados;</li>
<li>titulares envolvidos;</li>
<li>necessidade e proporcionalidade;</li>
</ul>
</div><div>
<ul>
<li>riscos aos titulares;</li>
<li>medidas de segurança;</li>
<li>salvaguardas;</li>
<li>mecanismos de mitigação;</li>
<li>plano de ação.</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="skip" data-class="chapter" data-theme="church" data-lang="pt" lang="pt" class="chapter" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:skip;--class:chapter;--theme:church;--lang:pt;" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>

<h1 id="ropa">ROPA</h1>
<h2 id="registro-das-opera%C3%A7%C3%B5es-de-tratamento">Registro das Operações de Tratamento</h2>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="32" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="17-registro-das-opera%C3%A7%C3%B5es-de-tratamento-ropa"><strong>17.</strong> Registro das Operações de Tratamento <strong>(ROPA)</strong></h1>
<div class="multicolumn" valign="center"><div>
<p>“O controlador e o operador <strong>devem</strong> manter registro das operações de tratamento de dados pessoais que realizarem, <strong>especialmente</strong> quando baseado no legítimo interesse.” <sup> (Art. 37) </sup></p>
</div><div>
<h3 id="o-ropa-registra">O <strong>ROPA</strong> registra:</h3>
<ul>
<li>processo;</li>
<li>finalidade;</li>
<li>dados tratados;</li>
<li>titulares;</li>
<li>base legal;</li>
</ul>
</div><div>
<ul>
<li>responsáveis;</li>
<li>compartilhamentos;</li>
<li>retenção;</li>
<li>sistemas;</li>
<li>controles de segurança;</li>
<li>eliminação.</li>
</ul>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-marpit-scope-zsvuhkwG="" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="33" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>

<h1 id="etapa-1-fluxo-resumido-do-tratamento-de-dados"><strong>Etapa 1:</strong> Fluxo Resumido do Tratamento de Dados</h1>
<h4 id="fluxo-de-tratamento-de-dados-pessoais-para-o-processo-exame-de-sa%C3%BAde-do-servidor-por-ocasi%C3%A3o-do-seu-anivers%C3%A1rio">Fluxo de tratamento de dados pessoais para o processo <strong>&quot;Exame de saúde do Servidor&quot;</strong> por ocasião do seu aniversário.</h4>
<div class="multicolumn" valign="center"><div>
<p><box> <code>1</code> <br /> RH identifica servidores elegível para exame periódico.</box></p>
</div><div>
<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container></p>
</div><div>
<p><box><code>2</code> <br /> Serviço Médico agenda atendimento.</box></p>
</div><div>
<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container></p>
</div><div>
<p><box> <code>3</code> <br /> Clínica/laboratório realiza exames.</p>
</box>
</div><div>
<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container></p>
</div><div>
<p><box><code>4</code> <br /> Resultados são encaminhados ao médico do trabalho.</box></p>
</div><div>
<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container></p>
</div><div>
<p><box><code>5</code> <br /> Emissão do ASO e registro em prontuário ocupacional.</box></p>
</div><div>
<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container></p>
</div><div>
<p><box><code>6</code> <br /> Armazenamento seguro das informações.</box></p>
</div><div>
<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container></p>
</div><div>
<p><box><code>7</code> <br /> Compartilhamento apenas quando necessário e autorizado por lei.</box></p>
</div><div>
<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container></p>
</div><div>
<p><box><code>8</code> <br /> Eliminação dos dados ao término do prazo de retenção aplicável.</box></p>
</div></div>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-marpit-scope-H72SNpCL="" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-background-color="#bbc7e2" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="34" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--background-color:#bbc7e2;--theme:church;--lang:pt;background-color:#bbc7e2;background-image:none;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">

<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>

</tr>

<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>

<h1 id="etapa-2-dados-do-processo-2"><strong>Etapa 2:</strong> Dados do Processo</h1>
<table>
<thead>
<tr>
<th style="text-align:right">Item</th>
<th>Descrição</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:right"><strong>Prazo de Retenção</strong></td>
<td>Conforme legislação trabalhista, normas do eSocial e políticas arquivísticas do Tribunal</td>
</tr>
<tr>
<td style="text-align:right"><strong>Forma de Armazenamento</strong></td>
<td>Sistema informatizado de saúde ocupacional e prontuários físicos em ambiente controlado</td>
</tr>
<tr>
<td style="text-align:right"><code>Medidas de Segurança</code></td>
<td>Controle de acesso por perfil, autenticação, registro de logs, criptografia, backups, sigilo médico, treinamento dos usuários e política de gestão de documentos</td>
</tr>
<tr>
<td style="text-align:right"><code>Riscos Identificados</code></td>
<td>Acesso indevido aos dados de saúde; vazamento de laudos; compartilhamento excessivo; perda de confidencialidade</td>
</tr>
<tr>
<td style="text-align:right"><code>Medidas Mitigatórias</code></td>
<td>Restrição de acesso ao corpo médico, segregação de funções, cláusulas contratuais de confidencialidade, monitoramento de acessos e capacitação periódica</td>
</tr>
<tr>
<td style="text-align:right"><code>Hipótese de Eliminação</code></td>
<td>Encerramento do prazo legal de guarda ou determinação legal específica</td>
</tr>
<tr>
<td style="text-align:right"><strong>Necessidade de RIPD</strong></td>
<td>Recomendada, em razão do tratamento de dados pessoais sensíveis (saúde)</td>
</tr>
<tr>
<td style="text-align:right"><strong>Periodicidade de Revisão do ROPA</strong></td>
<td>Anual ou em caso de alteração do processo</td>
</tr>
</tbody>
</table>

<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="etapa-3-defini%C3%A7%C3%A3o-das-bases-legais-aplic%C3%A1veis"><strong>Etapa 3:</strong> Definição das bases legais aplicáveis</h1>
<h2 id="dados-pessoais-comuns">Dados pessoais comuns:</h2>
<ul>
<li data-marpit-fragment="1"><strong>Cumprimento de obrigação legal ou regulatória</strong>.</li>
<li data-marpit-fragment="2"><strong>Execução de políticas públicas pela Administração Pública</strong>.</li>
</ul>
<h2 id="dados-pessoais-sens%C3%ADveis-sa%C3%BAde">Dados pessoais sensíveis (saúde):</h2>
<ul>
<li data-marpit-fragment="3"><strong>Cumprimento de obrigação legal ou regulatória</strong>.</li>
<li data-marpit-fragment="4"><strong>Tutela da saúde, exclusivamente em procedimento realizado por profissionais de saúde e serviços de saúde</strong>.</li>
</ul>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="skip" data-class="chapter" data-theme="church" data-lang="pt" lang="pt" class="chapter" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:skip;--class:chapter;--theme:church;--lang:pt;" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="bases-legais-de-tratamento">Bases Legais de Tratamento</h1>
<h2 id="quais-hip%C3%B3teses-permitem-o-tratamento-de-dados-pessoais">Quais hipóteses permitem o tratamento de dados pessoais?</h2>
<footer>Realização da TrustDPO - 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-header="Introdução à LGPD e à Proteção de Dados Pessoais" data-footer="Realização da TrustDPO - 2026" data-paginate="true" data-theme="church" data-lang="pt" lang="pt" data-marpit-pagination="38" style="--header:Introdução à LGPD e à Proteção de Dados Pessoais;--footer:Realização da TrustDPO - 2026;--paginate:true;--theme:church;--lang:pt;" data-marpit-pagination-total="44" data-transition-back="{&quot;name&quot;:&quot;none&quot;}" data-transition="{&quot;name&quot;:&quot;none&quot;}" data-size="16:9">
<header>Introdução à LGPD e à Proteção de Dados Pessoais</header>
<h1 id="o-que-%C3%A9-base-legal">O que é Base Legal?</h1>
<div class="multicolumn vcenter"><div>
<p><img src="./img/f027.png" alt="" style="height:400px;filter:brightness(1.1);" /></p>
</div><div>
<ul>
<li>
<h2 id="base-legal-%C3%A9-a-hip%C3%B3tese-jur%C3%ADdica-que-autoriza-o-br-tratamento-de-dados-pessoais">Base legal é a <strong>hipótese jurídica</strong> que <strong>autoriza</strong> o <br /> tratamento de dados pessoais.</h2>
</li>
<li>
<h2 id="sem-base-legal-adequada-o-tratamento-tende-br-a-ser-irregular">Sem base legal adequada, o tratamento tende <br /> a ser <strong>irregular</strong>.</h2>
</li>
<li>
<h2 id="toda-opera%C3%A7%C3%A3o-de-tratamento-deve-responder-%C3%A0-br-seguinte-pergunta">Toda <strong>operação</strong> de tratamento deve responder à <br /> seguinte pergunta:</h2>
</li>
</ul>
